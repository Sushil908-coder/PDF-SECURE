<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Viewing PDF — PDF Notes Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2d45;
      --accent: #3b82f6;
      --text: #e8eaf0;
      --muted: #6b7a99;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Security Layer: block selection everywhere ── */
    * {
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: auto;
    }

    /* ── Toolbar ── */
    .toolbar {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 1rem;
      z-index: 10;
      flex-shrink: 0;
    }

    .toolbar-back {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 0.35rem 0.75rem;
      font-size: 0.8125rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .toolbar-back:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .toolbar-title {
      flex: 1;
      font-size: 0.9375rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-pages {
      font-size: 0.8125rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar-nav {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .nav-btn {
      width: 32px;
      height: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .nav-btn:hover {
      background: var(--border);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-input {
      width: 44px;
      text-align: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      padding: 0.25rem;
      outline: none;
      -webkit-user-select: text !important;
      user-select: text !important;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .zoom-label {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 40px;
      text-align: center;
    }

    /* ── Security Overlay: prevents screenshot tools from capturing content ── */
    .security-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      /* Subtle noise pattern that disrupts screen recording */
      background-image: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.015) 2px,
          rgba(0, 0, 0, 0.015) 4px);
    }

    /* ── Watermark ── */
    .watermark {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-30deg);
      opacity: 0.045;
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      user-select: none;
    }

    /* ── PDF Canvas area ── */
    .pdf-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 1rem;
      position: relative;
      background: #1c1c2e;
    }

    /* Prevent right-click on pdf area */
    .pdf-wrapper canvas {
      display: block;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      border-radius: 4px;
      max-width: 100%;
    }

    /* ── Loading state ── */
    .loading-state {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Blur overlay (tab hidden) ── */
    .blur-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 26, 0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      font-size: 1.25rem;
      color: var(--muted);
    }

    .blur-overlay.show {
      display: flex;
    }

    .blur-overlay .lock-icon {
      font-size: 3rem;
    }

    /* ── Error state ── */
    .error-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .error-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    #watermark {
      position: fixed;
      top: 40%;
      left: 20%;
      font-size: 30px;
      color: rgba(0, 0, 0, 0.15);
      transform: rotate(-30deg);
      pointer-events: none;
      z-index: 9999;
    }

    #pdfContainer {
      width: 100%;
      padding: 10px;
    }

    canvas {
      max-width: 100%;
      height: auto;
      margin-bottom: 10px;
    }

    body {
      user-select: none;
    }
  </style>
</head>

<body>
  <!-- Security overlay (disrupts screen recording) -->
  <div class="security-overlay"></div>

  <!-- Dynamic watermark with student ID -->
  <div class="watermark" id="watermark">PDF Notes Platform</div>

  <!-- Blur overlay on tab switch -->
  <div class="blur-overlay" id="blurOverlay">
    <div class="lock-icon">🔒</div>
    <div>Content protected — switch back to continue</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <a href="/student/dashboard.html" class="toolbar-back">← Back</a>
    <div class="toolbar-title" id="pdfTitle">Loading...</div>
    <div class="toolbar-nav">
      <button class="nav-btn" id="prevBtn" onclick="changePage(-1)" disabled>‹</button>
      <input type="number" class="page-input" id="pageInput" min="1" value="1" onchange="jumpToPage()" />
      <button class="nav-btn" id="nextBtn" onclick="changePage(1)" disabled>›</button>
    </div>
    <div class="toolbar-pages" id="pageCount">— / —</div>
    <div class="zoom-controls">
      <button class="nav-btn" onclick="changeZoom(-0.25)">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="nav-btn" onclick="changeZoom(0.25)">+</button>
    </div>
  </div>

  <div id="pdfContainer"></div>

  <script src="/shared/device.js"></script>
  <script src="/shared/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfId = params.get("id");

    let pdfDoc = null;
    let currentPage = 1;
    let scale = 1;

    async function loadPDF() {
      const token = localStorage.getItem("token");
      console.log("TOKEN:", token);

      try {
        const loadingTask = pdfjsLib.getDocument({
          url: `/api/pdf/stream/${pdfId}?token=${token}`,
          // disableStream: true,
          // disableAutoFetch: true
        });

        pdfDoc = await loadingTask.promise;

        console.log("✅ PDF Loaded:", pdfDoc);

        // 🔥 LOOP ALL PAGES (IMPORTANT)
        const totalPages = pdfDoc.numPages;

        // 🔥 Fast render (parallel)
        for (let i = 1; i <= totalPages; i++) {
          await renderPage(i); // 🔥 ORDER FIX
        }

      } catch (error) {
        console.error("❌ PDF Load Error:", error);
        alert("PDF load failed ❌");
      }
    }

    async function renderPage(pageNum) {
      if (!pdfDoc) return;

      const page = await pdfDoc.getPage(pageNum);

      const container = document.getElementById("pdfContainer");

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      // const scale = window.innerWidth < 600 ? 1 : 1.5;
      const viewport = page.getViewport({ scale: scale, rotation: 90 });

      const outputScale = window.devicePixelRatio || 1;

      canvas.width = viewport.width * outputScale;
      canvas.height = viewport.height * outputScale;

      canvas.style.width = viewport.width + "px";
      canvas.style.height = viewport.height + "px";

      context.setTransform(outputScale, 0, 0, outputScale, 0, 0);

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;

      container.appendChild(canvas);
    }


    loadPDF();


    // 🔥 Screenshot / tab switch detect
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        document.body.style.filter = "blur(20px)";
      } else {
        document.body.style.filter = "none";
      }
    });

    setInterval(() => {
      document.body.style.opacity = "0.97";
      setTimeout(() => {
        document.body.style.opacity = "1";
      }, 100);
    }, 2000);

    // document.addEventListener("touchstart", e => {
    //   if (e.touches.length > 1) {
    //     e.preventDefault();
    //   }
    // }, { passive: false });


    async function changeZoom(value) {
  const container = document.getElementById("pdfContainer");

  const scrollTop = window.scrollY;

  scale += value;

  if (scale < 0.5) scale = 0.5;
  if (scale > 3) scale = 3;

  document.getElementById("zoomLabel").innerText =
    Math.round(scale * 100) + "%";

  container.innerHTML = "";

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    await renderPage(i); // 🔥 ORDER FIX
  }

  setTimeout(() => {
    window.scrollTo(0, scrollTop);
  }, 100);
}
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  </script>

</body>

</html>
